<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Food Health Scanner</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Barcode Health Scanner</h1>
    <p>Scan a food product to see if it's healthy!</p>
    
    <div id="camera-container">
      <video id="video" width="100%" height="100%" style="border: 1px solid gray"></video>
    </div>
    
    <button id="startButton">Start Scanner</button>
    <button id="resetButton" style="display:none;">Scan Another Item</button>

    <div id="result" class="hidden">
      <h2 id="productName">Product Name</h2>
      <p id="healthRating" class="rating">Rating will appear here</p>
      <div id="reasonsList"></div>
    </div>
  </div>

  <script type="text/javascript" src="https://unpkg.com/@zxing/library@latest"></script>
  <script src="script.js"></script>
</body>
</html>
