<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TotalCal - AI Scanned Label</title>
    <style>
        body {
            background-color: #1a1b1e;
            color: #ffffff;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background-color: #25262b;
            border: 1px solid #ffd700;
            border-radius: 12px;
            padding: 24px;
            width: 100%;
            max-width: 400px;
        }
        .title {
            color: #ffd700;
            text-align: center;
            font-size: 24px;
            margin-bottom: 5px;
        }
        .subtitle {
            text-align: center;
            color: #888;
            font-size: 12px;
            letter-spacing: 1px;
            margin-bottom: 15px;
        }
        .score {
            text-align: center;
            font-size: 48px;
            color: #ffd700;
            font-weight: bold;
            margin-bottom: 20px;
        }
        .bar-container {
            margin-bottom: 15px;
        }
        .bar-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
            font-size: 14px;
        }
        .bar-bg {
            background-color: #333;
            height: 8px;
            border-radius: 4px;
            width: 100%;
        }
        .bar-fill {
            height: 100%;
            border-radius: 4px;
        }
        /* Status Colors */
        .good-text { color: #4caf50; }
        .good-bg { background-color: #4caf50; }
        .high-text { color: #f44336; }
        .high-bg { background-color: #f44336; }
        
        /* Detailed Table */
        .details-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            font-size: 14px;
        }
        .details-table th, .details-table td {
            border-bottom: 1px solid #444;
            padding: 8px 0;
            text-align: left;
        }
        .details-table th { color: #aaa; }
    </style>
</head>
<body>

<div class="card">
    <h2 class="title">AI Scanned Label</h2>
    <div class="subtitle">OVERALL HEALTH SCORE</div>
    <div class="score">48%</div>

    <div class="bar-container">
        <div class="bar-header">
            <span><strong>Sugar:</strong> 7.6g</span>
            <span class="good-text">Good</span>
        </div>
        <div class="bar-bg"><div class="bar-fill good-bg" style="width: 25%;"></div></div>
    </div>

    <div class="bar-container">
        <div class="bar-header">
            <span><strong>Fat:</strong> 21.6g</span>
            <span class="high-text">Too High</span>
        </div>
        <div class="bar-bg"><div class="bar-fill high-bg" style="width: 85%;"></div></div>
    </div>

    <table class="details-table">
        <tr>
            <th>Nutrient</th>
            <th>Per Serve (30g)</th>
        </tr>
        <tr>
            <td><strong>Estimated Energy</strong></td>
            <td>106 kcal</td>
        </tr>
        <tr>
            <td>Protein</td>
            <td>3.3g</td>
        </tr>
        <tr>
            <td>Carbohydrates</td>
            <td>21.6g</td>
        </tr>
        <tr>
            <td>Sodium</td>
            <td>373.5mg</td>
        </tr>
    </table>
</div>

</body>
</html>
