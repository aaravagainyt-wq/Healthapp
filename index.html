<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Luxury Food Health Scanner</title>
  <style>
    /* --- LUXURY CSS DESIGN --- */
    * { box-sizing: border-box; }
    body { font-family: 'Montserrat', sans-serif; text-align: center; margin: 0; padding: 0; color: #eee; background: radial-gradient(circle, #1a1a1a 0%, #121212 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; }
    .main-container { max-width: 500px; width: 95%; margin: auto; padding: 20px; border-radius: 12px; }

    .luxury-title { color: #c5a02f; font-family: 'Playfair Display', serif; font-size: 32px; font-weight: bold; margin-bottom: 5px; text-shadow: 0 0 10px rgba(197, 160, 47, 0.5); }
    .luxury-instruction { color: #ddd; font-size: 15px; margin-bottom: 25px; }

    .viewfinder-container { margin: 15px auto; border-radius: 15px; background: #121212; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5); position: relative; overflow: hidden; }
    .viewfinder-inner { position: relative; border-radius: 10px; border: 4px solid transparent; background-clip: padding-box; background-image: linear-gradient(#121212, #121212), linear-gradient(135deg, #c5a02f, #1a1a1a, #c5a02f, #1a1a1a); background-origin: padding-box, border-box; min-height: 250px; display: flex; justify-content: center; align-items: center;}
    
    video { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; }
    #uploadedImagePreview { max-width: 100%; max-height: 250px; z-index: 5; border-radius: 8px; object-fit: contain; }

    .gold-button { border: none; padding: 14px 24px; margin: 8px 4px; font-size: 14px; font-weight: bold; border-radius: 8px; cursor: pointer; text-transform: uppercase; transition: all 0.3s ease; box-shadow: 0 4px 10px rgba(0,0,0,0.3); color: #121212; background: linear-gradient(135deg, #c5a02f 0%, #d4af37 50%, #c5a02f 100%); width: calc(50% - 12px); display: inline-block; letter-spacing: 0.5px; }
    .gold-button:hover { transform: translateY(-2px); box-shadow: 0 6px 15px rgba(197, 160, 47, 0.4); background: linear-gradient(135deg, #d4af37 0%, #e0c26b 50%, #d4af37 100%); }
    .full-width-btn { width: calc(100% - 8px); }

    .luxury-card { margin-top: 25px; padding: 25px 20px; border-radius: 12px; background: rgba(26, 26, 26, 0.95); border: 1px solid #c5a02f; box-shadow: 0 0 20px rgba(197, 160, 47, 0.15); }
    .gold-text { color: #c5a02f; font-size: 22px; margin-top: 0; margin-bottom: 5px; font-family: 'Playfair Display', serif; }
    
    .calorie-badge { display: inline-block; background: rgba(197, 160, 47, 0.15); border: 1px solid #c5a02f; color: #ffd700; padding: 8px 16px; border-radius: 20px; font-weight: bold; font-size: 18px; margin-bottom: 15px; box-shadow: 0 0 10px rgba(197, 160, 47, 0.2); }

    /* Progress Bars */
    .health-percentage { font-size: 42px; font-weight: bold; margin: 5px 0 15px 0; text-shadow: 0 0 15px rgba(0, 0, 0, 0.5); }
    .overall-bar-container { width: 100%; height: 8px; background: #333; border-radius: 4px; margin-bottom: 25px; overflow: hidden; border: 1px solid #444; }
    .overall-bar-fill { height: 100%; background: linear-gradient(90deg, #ff4d4d, #ffcc00, #33cc33); transition: width 1s cubic-bezier(0.4, 0, 0.2, 1); }
    
    .stat-row { text-align: left; margin-bottom: 18px; }
    .stat-labels { display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 6px; color: #ccc; }
    .stat-bar-bg { width: 100%; height: 6px; background: #222; border-radius: 3px; overflow: hidden; }
    .stat-bar-fill { height: 100%; border-radius: 3px; transition: width 1.2s cubic-bezier(0.4, 0, 0.2, 1); }
    
    .fill-good { background-color: #33cc33; box-shadow: 0 0 8px rgba(51, 204, 51, 0.5); color: #33cc33;}
    .fill-moderate { background-color: #ffcc00; box-shadow: 0 0 8px rgba(255, 204, 0, 0.5); color: #ffcc00;}
    .fill-bad { background-color: #ff4d4d; box-shadow: 0 0 8px rgba(255, 77, 77, 0.5); color: #ff4d4d;}

    /* Dynamic Table */
    .nutrition-table { width: 100%; border-collapse: collapse; margin-top: 25px; font-size: 13px; text-align: left; background: rgba(0,0,0,0.2); border-radius: 8px; overflow: hidden; }
    .nutrition-table th { color: #c5a02f; border-bottom: 1px solid rgba(197, 160, 47, 0.5); padding: 12px 10px; font-family: 'Playfair Display', serif; font-size: 15px; background: rgba(197, 160, 47, 0.05); }
    .nutrition-table td { padding: 10px; border-bottom: 1px solid #333; color: #ddd; }
    .nutrition-table tr:last-child td { border-bottom: none; }
    .nutrition-table tr:nth-child(even) { background: rgba(255,255,255,0.02); }

    /* AI Remarks */
    .ai-remarks-container { margin-top: 25px; padding: 15px; background: rgba(197, 160, 47, 0.05); border-left: 4px solid #c5a02f; border-radius: 4px; text-align: left; }
    .ai-remarks-title { color: #c5a02f; font-weight: bold; font-size: 14px; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px;}
    .ai-remarks-text { color: #eee; font-size: 14px; line-height: 1.5; font-style: italic; }

    .status-text { color: #c5a02f; margin-top: 20px; font-weight: 600; font-size: 14px; padding: 10px; border-radius: 8px; background: rgba(197, 160, 47, 0.1); border: 1px solid rgba(197, 160, 47, 0.3); }
    .error-text { color: #ff4d4d; border-color: rgba(255, 77, 77, 0.3); background: rgba(255, 77, 77, 0.1); }
    .hidden { display: none !important; }

    /* Loading Spinner */
    .spinner { display: inline-block; width: 20px; height: 20px; border: 3px solid rgba(197, 160, 47, 0.3); border-radius: 50%; border-top-color: #c5a02f; animation: spin 1s ease-in-out infinite; margin-right: 10px; vertical-align: middle; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <script type="text/javascript" src="https://unpkg.com/@zxing/library@latest"></script>
</head>
<body>
  <div class="main-container">
    <h1 class="luxury-title">Health Scanner</h1>
    <p class="luxury-instruction">Scan a barcode or upload a nutrition label.</p>
    
    <div id="camera-frame" class="viewfinder-container">
      <div id="scanner-view" class="viewfinder-inner">
        <video id="video" autoplay playsinline class="hidden"></video>
        <img id="uploadedImagePreview" class="hidden" alt="Uploaded Ingredients">
        <div id="placeholderText" style="color: #666; display: flex; flex-direction: column; align-items: center; gap: 10px;">
          <svg width="40" height="40" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
          <span>Camera / Image Area</span>
        </div>
      </div>
    </div>
    
    <div id="action-area">
      <button id="startButton" class="gold-button">SCAN BARCODE</button>
      <label class="gold-button" style="text-align: center;">
        UPLOAD LABEL
        <input type="file" id="imageUpload" accept="image/*" capture="environment" class="hidden">
      </label>
      <button id="resetButton" class="hidden gold-button full-width-btn">START OVER</button>
    </div>

    <div id="result" class="hidden luxury-card">
      <h2 id="productName" class="gold-text">Product Name</h2>
      
      <div id="caloriesBadge" class="calorie-badge hidden">Calories: --</div>

      <p style="margin:0; color:#888; font-size: 12px; text-transform: uppercase; letter-spacing: 1px;">Overall Health Score</p>
      <div id="healthPercentage" class="health-percentage">0%</div>
      
      <div class="overall-bar-container">
        <div id="overallBarFill" class="overall-bar-fill" style="width: 0%;"></div>
      </div>
      
      <div id="detailedStats"></div>
      <div id="dynamicTableContainer"></div>

      <div id="aiRemarksContainer" class="ai-remarks-container hidden">
        <div class="ai-remarks-title">AI Remarks</div>
        <div id="aiRemarksText" class="ai-remarks-text"></div>
      </div>
    </div>
    
    <div id="statusMessage" class="status-text hidden"></div>
  </div>
  
  <script>
    // --- APP CONFIGURATION ---
    const AI_BACKEND_URL = "https://lord123hh-shsj.hf.space/upload";
    
    const codeReader = new ZXing.BrowserMultiFormatReader();
    const startButton = document.getElementById('startButton');
    const imageUpload = document.getElementById('imageUpload');
    const resetButton = document.getElementById('resetButton');
    
    const videoElement = document.getElementById('video');
    const imagePreview = document.getElementById('uploadedImagePreview');
    const placeholderText = document.getElementById('placeholderText');
    const resultDiv = document.getElementById('result');
    const statusMessage = document.getElementById('statusMessage');

    // ==========================================
    // 2. AI VISION SCANNER 
    // ==========================================
    imageUpload.addEventListener('change', async (event) => {
      const file = event.target.files[0];
      if (!file) return;

      resetUI();
      codeReader.reset(); 
      
      const imageUrl = URL.createObjectURL(file);
      imagePreview.src = imageUrl;
      imagePreview.classList.remove('hidden');
      placeholderText.classList.add('hidden');
      
      showStatus(`<div class="spinner"></div> AI is triple-checking the label... please wait.`);

      try {
        const formData = new FormData();
        formData.append('image', file);

        const response = await fetch(AI_BACKEND_URL, {
            method: 'POST',
            body: formData
        });

        if (!response.ok) throw new Error("AI Backend is offline or sleeping.");
        
        const aiData = await response.json();
        console.log("AI Triple-Check Data:", aiData);

        if (aiData.error) throw new Error(aiData.error);

        renderResults("AI Scanned Label", aiData);

      } catch (error) {
        console.error(error);
        showStatus(`Scan Failed: ${error.message}`, true);
      } finally {
        imageUpload.value = '';
      }
    });

    // ==========================================
    // 3. UI CONTROLS & RENDERING
    // ==========================================
    resetButton.addEventListener('click', () => {
      resetUI();
      codeReader.reset();
      placeholderText.innerHTML = `
        <svg width="40" height="40" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
        <span>Camera / Image Area</span>`;
      placeholderText.classList.remove('hidden');
      document.getElementById('action-area').classList.remove('hidden');
      startButton.classList.remove('hidden');
      imageUpload.parentElement.classList.remove('hidden');
      resetButton.classList.add('hidden');
    });

    function resetUI() {
      resultDiv.classList.add('hidden');
      statusMessage.classList.add('hidden');
      statusMessage.classList.remove('error-text');
      videoElement.classList.add('hidden');
      imagePreview.classList.add('hidden');
      startButton.classList.add('hidden');
      imageUpload.parentElement.classList.add('hidden');
      resetButton.classList.remove('hidden');
      
      document.getElementById('overallBarFill').style.width = '0%';
      document.getElementById('detailedStats').innerHTML = '';
      document.getElementById('dynamicTableContainer').innerHTML = ''; 
      document.getElementById('aiRemarksContainer').classList.add('hidden');
      document.getElementById('caloriesBadge').classList.add('hidden');
    }

    function showStatus(msg, isError = false) {
      statusMessage.innerHTML = msg;
      statusMessage.classList.remove('hidden');
      if (isError) statusMessage.classList.add('error-text');
      else statusMessage.classList.remove('error-text');
    }

    // Renders exactly what the AI Backend tells it to
    function renderResults(name, aiData) {
      statusMessage.classList.add('hidden');
      resultDiv.classList.remove('hidden');
      document.getElementById('productName').innerText = name;

      // 1. Calories
      if (aiData.calories) {
        const calBadge = document.getElementById('caloriesBadge');
        calBadge.innerText = `Energy / Calories: ${aiData.calories}`;
        calBadge.classList.remove('hidden');
      }

      // 2. Health Percentage
      const score = aiData.health_score || 0;
      document.getElementById('healthPercentage').innerText = `${score}%`;
      if (score >= 70) document.getElementById('healthPercentage').style.color = "#33cc33";
      else if (score >= 40) document.getElementById('healthPercentage').style.color = "#ffcc00";
      else document.getElementById('healthPercentage').style.color = "#ff4d4d";
      
      setTimeout(() => { document.getElementById('overallBarFill').style.width = `${score}%`; }, 50);

      // 3. Main Bars (Render whatever AI sent)
      if (aiData.main_bars && aiData.main_bars.length > 0) {
        let statsHTML = "";
        aiData.main_bars.forEach(bar => {
          statsHTML += createStatBar(bar.name, bar.amount, bar.percentage, bar.status, bar.colorClass);
        });
        document.getElementById('detailedStats').innerHTML = statsHTML;
        
        setTimeout(() => {
          aiData.main_bars.forEach(bar => {
            const barElement = document.getElementById(`bar-${bar.name}`);
            if(barElement) barElement.style.width = `${bar.percentage}%`;
          });
        }, 100);
      }

      // 4. Dynamic All Nutrients Table (with Health Status)
      if (aiData.all_nutrients && Object.keys(aiData.all_nutrients).length > 0) {
        let tableHTML = `
          <table class="nutrition-table">
            <thead>
              <tr>
                <th>Nutrient</th>
                <th>Amount</th>
                <th>Evaluation</th>
              </tr>
            </thead>
            <tbody>
        `;
        
        for (const [key, details] of Object.entries(aiData.all_nutrients)) {
          let cleanKey = key.replace(/_/g, ' ').replace(/\b\w/g, l => l.toUpperCase());
          let statusColor = details.status.includes("Good") ? "#33cc33" : details.status.includes("High") ? "#ff4d4d" : "#ffcc00";
          
          tableHTML += `
            <tr>
              <td><strong>${cleanKey}</strong></td>
              <td>${details.amount}</td>
              <td style="color: ${statusColor}; font-weight: bold;">${details.status}</td>
            </tr>
          `;
        }
        tableHTML += `</tbody></table>`;
        document.getElementById('dynamicTableContainer').innerHTML = tableHTML;
      }

      // 5. AI Remarks
      if (aiData.ai_remarks) {
        document.getElementById('aiRemarksText').innerText = aiData.ai_remarks;
        document.getElementById('aiRemarksContainer').classList.remove('hidden');
      }
    }

    function createStatBar(label, amount, percentage, statusText, colorClass) {
      // Clean up color mapping based on backend class
      let textColor = colorClass === 'fill-bad' ? '#ff4d4d' : colorClass === 'fill-moderate' ? '#ffcc00' : '#33cc33';
      return `
        <div class="stat-row">
          <div class="stat-labels">
            <span><strong>${label}</strong>: ${amount}</span>
            <span style="color: ${textColor}; font-weight: bold;">${statusText}</span>
          </div>
          <div class="stat-bar-bg">
            <div id="bar-${label}" class="stat-bar-fill ${colorClass}" style="width: 0%;"></div>
          </div>
        </div>
      `;
    }
  </script>
</body>
</html>
